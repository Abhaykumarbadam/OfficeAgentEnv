name: OfficeAgentEnv
author: "OfficeAgentEnv Team"
version: "1.0.0"

description: >
  A real-world AI environment simulating an office assistant workflow.
  The agent processes an email inbox by classifying emails, scheduling meetings,
  replying to queries, and ignoring spam under time and conflict constraints.

tags:
  - openenv
  - email
  - scheduling
  - productivity
  - nlp
  - multi-step

tasks:
  - name: easy
    description: "Classify 5 deterministic emails into correct categories."
    difficulty: easy
    max_steps: 10
    success_threshold: 0.6

  - name: medium
    description: "Classify emails and schedule conflict-free meetings from a mixed inbox."
    difficulty: medium
    max_steps: 15
    success_threshold: 0.5

  - name: hard
    description: "Full workflow automation: classify, reply, schedule, and ignore spam across a noisy inbox."
    difficulty: hard
    max_steps: 12
    success_threshold: 0.4

action_space:
  type: object
  properties:
    action_type:
      type: string
      enum: [classify_email, reply_email, schedule_meeting, ignore_email]

    email_id:
      type: string

    category:
      type: string
      enum: [meeting_request, urgent_task, spam, general_query, unknown]

    reply_text:
      type: string

    meeting_title:
      type: string

    meeting_start_time:
      type: string

    meeting_end_time:
      type: string

    participants:
      type: array
      items:
        type: string

  required:
    - action_type
    - email_id

observation_space:
  type: object
  properties:
    pending_emails:
      type: array
      items:
        type: object

    processed_emails:
      type: array
      items:
        type: object

    calendar_events:
      type: array
      items:
        type: object

    last_action_result:
      type: string

    current_step:
      type: integer

    task_name:
      type: string

reward:
  type: float
  description: >
    Dense reward signal encouraging correct multi-step behavior:
    +0.30 correct classification
    +0.30 conflict-free meeting scheduling
    +0.20 relevant reply
    +0.10 correct spam ignore
    -0.20 incorrect classification
    -0.25 scheduling conflict
    -0.15 ignoring important email
    -0.02 step penalty

endpoints:
  reset: "POST /reset"
  step:  "POST /step"
  state: "GET /state"
  tasks: "GET /tasks"
  grade: "POST /grade"
