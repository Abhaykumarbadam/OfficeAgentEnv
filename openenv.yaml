name: OfficeAgentEnv
author: "OfficeAgentEnv Team"
version: "1.0.0"

description: >
  A real-world AI environment simulating an office assistant workflow.
  The agent processes an email inbox by classifying emails, scheduling meetings,
  replying to queries, and ignoring spam under time and conflict constraints.

tags:
  - openenv
  - email
  - scheduling
  - productivity
  - nlp
  - multi-step

tasks:
  - id: easy
    name: easy
    description: "Classification-focused task over deterministic emails (classify_email policy path)."
    difficulty: easy
    max_steps: 10
    success_threshold: 0.6
    grader:
      type: deterministic
      endpoint: /grade

  - id: medium
    name: medium
    description: "Classify emails and schedule conflict-free meetings from a mixed inbox."
    difficulty: medium
    max_steps: 15
    success_threshold: 0.5
    grader:
      type: deterministic
      endpoint: /grade

  - id: hard
    name: hard
    description: "Full workflow automation: classify, reply, schedule, and ignore spam across a noisy inbox."
    difficulty: hard
    max_steps: 12
    success_threshold: 0.4
    grader:
      type: deterministic
      endpoint: /grade

action_space:
  type: object
  properties:
    action_type:
      type: string
      enum: [classify_email, reply_email, schedule_meeting, ignore_email, assign_task, query_status, update_project]

    email_id:
      type: string

    category:
      type: string
      enum: [meeting_request, urgent_task, spam, general_query, unknown]

    reply_text:
      type: string

    meeting_title:
      type: string

    meeting_start_time:
      type: string

    meeting_end_time:
      type: string

    participants:
      type: array
      items:
        type: string

    team:
      type: string

    project_id:
      type: string

    project_status:
      type: string
      enum: [on_track, delayed, blocked, completed]

  required:
    - action_type
    - email_id

observation_space:
  type: object
  properties:
    pending_emails:
      type: array
      items:
        type: object

    processed_emails:
      type: array
      items:
        type: object

    calendar_events:
      type: array
      items:
        type: object

    last_action_result:
      type: string

    current_step:
      type: integer

    task_name:
      type: string

reward:
  type: float
  description: >
    Event-based reward:
    r_t = w_s*e_success + w_q*e_quality + w_e*e_efficiency - w_v*e_violation - w_d*e_delayed.
    Event terms are bounded in [0,1], weights are calibrated non-negative constants,
    and per-step reward is clipped to [-1, 1] for stability.

endpoints:
  reset: "POST /reset"
  step:  "POST /step"
  state: "GET /state"
  tasks: "GET /tasks"
  grade: "POST /grade"
